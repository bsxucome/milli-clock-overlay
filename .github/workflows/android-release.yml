name: Android Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Prepare Android SDK path
        shell: bash
        run: |
          SDK_PATH="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          if [ -z "$SDK_PATH" ]; then
            echo "Android SDK path is not available on this runner."
            exit 1
          fi
          printf "sdk.dir=%s\n" "$SDK_PATH" > local.properties

      - name: Remove local-only Windows Gradle override
        run: sed -i '/^android.aapt2FromMavenOverride=/d' gradle.properties

      - name: Prepare release signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release-keystore.jks
            printf '%s\n' \
              'storeFile=release-keystore.jks' \
              "storePassword=$ANDROID_KEYSTORE_PASSWORD" \
              "keyAlias=$ANDROID_KEY_ALIAS" \
              "keyPassword=$ANDROID_KEY_PASSWORD" \
              > keystore.properties
          else
            echo "Release signing secrets are missing. The workflow will build an unsigned release APK."
          fi

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Prepare release assets
        id: assets
        shell: bash
        run: |
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            APK_PATH="app/build/outputs/apk/release/app-release.apk"
            APK_NAME="app-release.apk"
          else
            APK_PATH="app/build/outputs/apk/release/app-release-unsigned.apk"
            APK_NAME="app-release-unsigned.apk"
          fi

          SHA_PATH="${APK_PATH}.sha256"
          sha256sum "$APK_PATH" > "$SHA_PATH"

          {
            echo "apk_path=$APK_PATH"
            echo "apk_name=$APK_NAME"
            echo "sha_path=$SHA_PATH"
            echo "sha_name=$(basename "$SHA_PATH")"
          } >> "$GITHUB_OUTPUT"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.ref_name }}
          path: |
            ${{ steps.assets.outputs.apk_path }}
            ${{ steps.assets.outputs.sha_path }}
          if-no-files-found: error

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTES_FILE="release-notes.md"

          printf '%s\n' \
            "Milli Clock Overlay ${TAG}" \
            "" \
            "Included:" \
            "- floating draggable clock overlay" \
            "- split date and time layout" \
            "- red milliseconds" \
            "- tap to show the close button" \
            "- Android 14+ foreground service compatibility" \
            "" \
            "Notes:" \
            "- some system settings and security pages may hide overlays by design" \
            "- if signing secrets are missing, this release contains an unsigned APK" \
            > "$NOTES_FILE"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              "${{ steps.assets.outputs.apk_path }}#${{ steps.assets.outputs.apk_name }}" \
              "${{ steps.assets.outputs.sha_path }}#${{ steps.assets.outputs.sha_name }}" \
              --clobber
            gh release edit "$TAG" --title "Milli Clock Overlay ${TAG}" --notes-file "$NOTES_FILE"
          else
            gh release create "$TAG" \
              "${{ steps.assets.outputs.apk_path }}#${{ steps.assets.outputs.apk_name }}" \
              "${{ steps.assets.outputs.sha_path }}#${{ steps.assets.outputs.sha_name }}" \
              --title "Milli Clock Overlay ${TAG}" \
              --notes-file "$NOTES_FILE"
          fi
